spring:
  application:
    name: url-shortener
  datasource:
    # Use variables with fallbacks (Host defaults to localhost, port defaults to 5432)
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/urlshortener
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # ===================================================================
  # = JPA & HIBERNATE CONFIGURATION (Production)
  # ===================================================================
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect